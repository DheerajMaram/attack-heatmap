title: PowerShell Network Connection
id: 1f21ec3f-810d-4b0e-8045-c34153399813
status: test
description: Detects PowerShell making outbound network connections, which may
    indicate C2 communication, data exfiltration, or payload download.
references:
    - https://attack.mitre.org/techniques/T1071/001/
    - https://attack.mitre.org/techniques/T1105/
author: Florian Roth (Nextron Systems)
date: 2019-01-16
modified: 2023-09-14
tags:
    - attack.command_and_control
    - attack.t1071.001
    - attack.execution
    - attack.t1059.001
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        Initiated: 'true'
    filter_local:
        DestinationIp|startswith:
            - '10.'
            - '192.168.'
            - '127.'
    condition: selection and not filter_local
falsepositives:
    - Windows Update, software management tools
    - Legitimate administration scripts
level: medium
